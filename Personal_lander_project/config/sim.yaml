# Simulation settings

integrator:
  method: RK45
  dt_output_s: 0.02           # Output sample interval [s]  (50 Hz)
  t_end_s: 2500.0             # Maximum simulation duration [s]
  max_step_s: 0.5             # Hard cap on integrator step

initial_conditions:
  # Spherical moon-fixed frame: (r, latitude, longitude)
  altitude_m: 1000.0          # Above surface [m]
  latitude_rad: 0.785         # ~45 deg
  longitude_rad: 0.785        # ~45 deg
  v_radial_ms: 0.0            # Positive = upward [m/s]
  v_east_ms: 50.0             # Eastward velocity [m/s]
  v_north_ms: 0.0             # Northward velocity [m/s]

touchdown:
  max_vertical_speed_ms: 2.0  # Hard limit for safe landing [m/s]
  target_vertical_speed_ms: 1.5
